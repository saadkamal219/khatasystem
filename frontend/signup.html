<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" type="image" href="img/KhataFinalLogo.png">
  <title>Khata — Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="brand">
      <div class="brand-icon">খ</div>
      <h1>Create Account</h1>
      <p>Join Khata to track your credit</p>
    </div>

    <form id="signupForm" autocomplete="on">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your full name" autocomplete="name" required />
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="01XXXXXXXXX" autocomplete="tel" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password" required />
      </div>

      <div id="errorMsg" class="error-msg hidden"></div>
      <div id="successMsg" class="success-msg hidden"></div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="signupBtn">
        Create Account
      </button>
    </form>

    <p class="auth-footer" style="margin-top:16px">
      Already have an account? <a href="index.html">Sign in</a>
    </p>
  </div>

  <script src="js/config.js"></script>
  <script src="js/signup.js"></script>
</body>
</html>
