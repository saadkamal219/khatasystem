<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khata - Sign Up</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="brand">
      <div class="brand-icon">খ</div>
      <h1>Khata</h1>
      <p>Create your account</p>
    </div>

    <form id="signupForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your name" required />
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="phone" placeholder="01XXXXXXXXX" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="At least 6 characters" required />
      </div>

      <div id="errorMsg" class="error-msg hidden"></div>
      <div id="successMsg" class="success-msg hidden"></div>

      <button type="submit" class="btn btn-primary btn-full" id="signupBtn">
        Create Account
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="index.html">Login</a>
    </p>
  </div>

  <script src="js/config.js"></script>
  <script src="js/signup.js"></script>
</body>
</html>
