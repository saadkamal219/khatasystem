<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" type="image" href="img/KhataFinalLogo.png">
  <title>Khata — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/admin.css" />
  <link rel="stylesheet" href="css/profile.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">
      <span class="nav-brand-dot"></span>
      Khata
    </div>
    <div class="nav-right">
      <span class="admin-badge">Admin</span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <div class="container">

    <!-- Admin stats -->
    <div class="admin-stats" id="adminStats">
      <div class="stat-card">
        <div class="stat-label">Customers</div>
        <div class="stat-value" id="statUsers">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Owed</div>
        <div class="stat-value" style="color:var(--red)" id="statOwed">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value" style="color:var(--amber)" id="statPending">—</div>
      </div>
    </div>

    <!-- Pending Requests -->
    <div class="section" id="pendingSection">
      <div class="section-header">
        <div class="section-title">⏳ Pending Approvals</div>
        <button class="btn btn-ghost btn-sm" onclick="loadPendingRequests()">↻ Refresh</button>
      </div>
      <div id="pendingRequests">
        <div class="loading-row"><div class="spinner"></div> Loading...</div>
      </div>
    </div>

    <!-- All Customers -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">All Customers</div>
        <button class="btn btn-ghost btn-sm" onclick="loadAllUsers()">↻ Refresh</button>
      </div>
      <div id="userList">
        <div class="loading-row"><div class="spinner"></div> Loading...</div>
      </div>
    </div>

  </div>

  <!-- User Detail Modal -->
  <div id="userDetailModal" class="modal hidden">
    <div class="modal-content modal-large">
      <span class="modal-handle"></span>
      <div class="detail-user-header">
        <div class="detail-avatar" id="detailAvatar">?</div>
        <div>
          <div class="detail-name" id="detailUserName">—</div>
          <div class="detail-phone" id="detailUserPhone">—</div>
        </div>
        <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="closeDetailModal()">✕</button>
      </div>

      <!-- Tabs -->
      <div class="detail-tabs">
        <button class="detail-tab active" id="tabTransactions" onclick="switchTab('transactions')">Transactions</button>
        <button class="detail-tab" id="tabProfile" onclick="switchTab('profile')">Profile</button>
      </div>

      <!-- Transactions Tab -->
      <div id="tabContentTransactions">
        <div class="cards-row" id="detailCards"></div>
        <div class="section-title" style="margin-bottom:12px">Transaction History</div>
        <div id="detailTransactions"></div>
      </div>

      <!-- Profile Tab -->
      <div id="tabContentProfile" class="hidden">
        <div id="detailProfile"></div>
      </div>
    </div>
  </div>

  <!-- Reject Modal -->
  <div id="rejectModal" class="modal hidden">
    <div class="modal-content">
      <span class="modal-handle"></span>
      <h3>Reject Request</h3>
      <p class="modal-subtitle">The customer will see your reason</p>
      <div class="form-group" style="margin-top:16px">
        <label>Reason <span style="font-weight:400;text-transform:none;opacity:0.6">(optional)</span></label>
        <input type="text" id="rejectNote" placeholder="e.g. amount seems incorrect..." />
      </div>
      <div class="modal-buttons">
        <button class="btn btn-outline" onclick="closeRejectModal()">Cancel</button>
        <button class="btn btn-red" onclick="confirmReject()">Reject</button>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-brand">খ Khata</div>
    <div class="footer-tagline">Simple credit management for your shop</div>
    <div class="footer-divider"></div>
    <a class="footer-watermark" href="#" title="Built by RAMS Tech">
      <span class="footer-watermark-sub">Developed by &nbsp;</span>
      <span class="footer-watermark-text"><span style="color: #c2410c;">RAMSTech</span></span>
    </a>
    <div class="footer-copy">&copy; 2025 RAMS Tech. All rights reserved.</div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
