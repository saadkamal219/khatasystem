<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khata - Login</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="brand">
      <div class="brand-icon">খ</div>
      <h1>Khata</h1>
      <p>Credit Management System</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label>Phone Number / Username</label>
        <input type="text" id="phone" placeholder="01XXXXXXXXX" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>

      <div id="errorMsg" class="error-msg hidden"></div>

      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
        Login
      </button>
    </form>

    <p class="auth-footer">
      No account? <a href="signup.html">Create one</a>
    </p>
  </div>

  <script src="js/config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
